<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zendesk Analytics</title>
    <link rel="stylesheet" href="/static/styles.css">
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Main Container -->
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <h1 class="logo">Zendesk Analytics</h1>
                    <span class="logo-subtitle">Powered by Groq LPU</span>
                </div>
                <div class="status-badge" id="statusBadge">
                    <span class="status-dot"></span>
                    <span id="statusText">Ready</span>
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chatArea">
            <!-- Welcome Screen -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-content">
                    <h2>Ask anything about your tickets</h2>
                    <p>Lightning-fast analytics with Groq-powered reasoning</p>

                    <div class="example-queries">
                        <button class="example-btn" data-query="How many tickets did Bolna raise?">
                            <span class="example-icon">📊</span>
                            <span>How many tickets did Bolna raise?</span>
                        </button>
                        <button class="example-btn" data-query="What issues did Kixie face recently?">
                            <span class="example-icon">🔍</span>
                            <span>What issues did Kixie face recently?</span>
                        </button>
                        <button class="example-btn" data-query="Top 10 customers by ticket count">
                            <span class="example-icon">📈</span>
                            <span>Top 10 customers by ticket count</span>
                        </button>
                        <button class="example-btn" data-query="Summarize high-priority tickets">
                            <span class="example-icon">⚡</span>
                            <span>Summarize high-priority tickets</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer"></div>
        </main>

        <!-- Input Area -->
        <div class="input-wrapper">
            <div class="input-container">
                <input
                    type="text"
                    id="queryInput"
                    class="query-input"
                    placeholder="Ask a question about your tickets..."
                    autocomplete="off"
                />
                <button id="sendButton" class="send-button" type="button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Ticket Preview Modal (template) -->
    <script src="/static/app.js"></script>
</body>
</html>
